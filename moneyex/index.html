<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>환율계산기</title>
  <style>
    /* ===============================================
       전체 화면 스타일 - 하늘색 배경
       =============================================== */
    body {
      margin: 0;
      padding: 20px 10px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      /* 하늘색 그라데이션 배경 */
      background: linear-gradient(160deg, #8fd3ff 0%, #bfe9ff 60%, #e6f7ff 100%);
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      box-sizing: border-box;
    }

    /* ===============================================
       계산기 전체를 감싸는 카드 (중앙 배치)
       =============================================== */
    .calculator {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 32px;
      padding: 24px 18px 30px 18px;
      box-shadow: 0 20px 40px rgba(0, 80, 150, 0.25);
      box-sizing: border-box;
    }

    .title {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: #1974b5;
      margin-bottom: 18px;
    }

    /* ===============================================
       화폐 선택 영역 (좌우 대칭)
       =============================================== */
    .currency-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      position: relative;
      margin-bottom: 12px;
    }

    .currency-box {
      flex: 1;
      position: relative;
    }

    .currency-label {
      font-size: 13px;
      color: #4a90c2;
      text-align: center;
      margin-bottom: 6px;
      font-weight: bold;
    }

    /* 화폐 선택 버튼 (국기 + 이름) */
    .currency-button {
      width: 100%;
      padding: 14px 8px;
      border: none;
      border-radius: 20px;
      background: #eaf6ff;
      color: #1974b5;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.15s;
    }
    .currency-button:active {
      background: #cdeaff;
      transform: scale(0.96);
    }

    /* 화폐 선택 드롭다운 목록 */
    .currency-dropdown {
      display: none; /* 평소에는 숨김, 클릭시 나타남 */
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      z-index: 10;
      overflow: hidden;
      margin-top: 6px;
    }
    .currency-dropdown.open {
      display: block; /* open 클래스가 붙으면 목록 표시 */
    }
    .currency-option {
      padding: 12px 10px;
      font-size: 15px;
      cursor: pointer;
      text-align: center;
      color: #333;
    }
    .currency-option:hover, .currency-option:active {
      background: #eaf6ff;
    }

    /* 가운데 화살표 표시 (기존화폐 -> 바꿀화폐) */
    .arrow-icon {
      align-self: center;
      font-size: 20px;
      color: #4a90c2;
      padding: 0 4px;
    }

    /* ===============================================
       환전(변환) 버튼 - 화폐버튼 바로 아래 배치
       =============================================== */
    .convert-button {
      width: 100%;
      padding: 16px;
      margin: 6px 0 14px 0;
      border: none;
      border-radius: 20px;
      background: #1974b5;
      color: #ffffff;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.15s;
    }
    .convert-button:active {
      background: #145d92;
      transform: scale(0.98);
    }

    /* ===============================================
       입력값 / 결과값 박스 (좌우 대칭)
       =============================================== */
    .box-row {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }
    .box-item {
      flex: 1;
    }
    .box-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
      text-align: right;
      padding-right: 4px;
    }
    .number-box {
      width: 100%;
      box-sizing: border-box;
      background: #f2f8fc;
      border: 2px solid #d5eaf7;
      border-radius: 16px;
      padding: 14px 10px;
      font-size: 20px;
      text-align: right;
      color: #1a1a1a;
      overflow-x: auto;
      white-space: nowrap;
    }
    .result-box {
      background: #eaf9f0;
      border: 2px solid #cdeedb;
      color: #128a4a;
      font-weight: bold;
    }

    /* ===============================================
       숫자 키패드 (동그랗고 큼직한 버튼, 모바일 터치 용이)
       =============================================== */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .key {
      aspect-ratio: 1 / 1;
      border: none;
      border-radius: 50%; /* 동그란 버튼 */
      background: #f0f4f8;
      color: #222;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .key:active {
      background: #dbe7f0;
      transform: scale(0.92);
    }
    .key.function-key {
      background: #ffe3e3;
      color: #d33;
      font-size: 18px;
    }
    .key.function-key:active {
      background: #ffcaca;
    }
    .key.dot-key {
      background: #eef2f5;
      font-size: 26px;
    }
    /* 지우기(C) 버튼처럼 3칸을 모두 차지하는 가로로 긴 버튼 */
    .key.full-width {
      grid-column: span 3;
      aspect-ratio: auto;
      border-radius: 24px;
      height: 56px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="title">💱 환율계산기</div>

    <!-- ===============================================
         화폐 선택 영역 (기존화폐 / 바꿀화폐) - 좌우 대칭
         =============================================== -->
    <div class="currency-row">

      <!-- 기존 화폐 (변환 전) -->
      <div class="currency-box">
        <div class="currency-label">기존 화폐</div>
        <button class="currency-button" id="fromButton" onclick="toggleDropdown('from')">🇰🇷 원화 ▾</button>
        <div class="currency-dropdown" id="fromDropdown"></div>
      </div>

      <div class="arrow-icon">➡</div>

      <!-- 바꿀 화폐 (변환 후) -->
      <div class="currency-box">
        <div class="currency-label">바꿀 화폐</div>
        <button class="currency-button" id="toButton" onclick="toggleDropdown('to')">🇺🇸 달러 ▾</button>
        <div class="currency-dropdown" id="toDropdown"></div>
      </div>

    </div>

    <!-- ===============================================
         환전 버튼 (화폐버튼 바로 아래에 배치)
         =============================================== -->
    <button class="convert-button" onclick="convertCurrency()">환 전 하 기</button>

    <!-- ===============================================
         입력값 박스 / 결과값 박스 - 좌우 대칭
         =============================================== -->
    <div class="box-row">
      <div class="box-item">
        <div class="box-label">입력 금액</div>
        <div class="number-box" id="inputBox">0</div>
      </div>
      <div class="box-item">
        <div class="box-label">변환 결과</div>
        <div class="number-box result-box" id="resultBox">0</div>
      </div>
    </div>

    <!-- ===============================================
         숫자 키패드 (1~9, 0 + 00 + 소수점, 지우기)
         =============================================== -->
    <div class="keypad">
      <button class="key" onclick="inputNumber('7')">7</button>
      <button class="key" onclick="inputNumber('8')">8</button>
      <button class="key" onclick="inputNumber('9')">9</button>

      <button class="key" onclick="inputNumber('4')">4</button>
      <button class="key" onclick="inputNumber('5')">5</button>
      <button class="key" onclick="inputNumber('6')">6</button>

      <button class="key" onclick="inputNumber('1')">1</button>
      <button class="key" onclick="inputNumber('2')">2</button>
      <button class="key" onclick="inputNumber('3')">3</button>

      <button class="key dot-key" onclick="inputDecimal()">.</button>
      <button class="key" onclick="inputNumber('0')">0</button>
      <button class="key" onclick="inputDoubleZero()">00</button>

      <button class="key function-key full-width" onclick="clearInput()">C 지우기</button>
    </div>
  </div>

  <script>
    /* ===============================================
       화면(클라이언트) 자바스크립트
       식별자/변수명은 쉬운 영어로 작성했습니다.
       =============================================== */

    // 서버(Code.gs)와 통신이 늦거나 실패해도 화폐 선택 버튼이 바로 작동하도록,
    // 화면이 열리자마자 사용할 수 있는 기본 환율 정보를 미리 넣어둡니다.
    // (서버 응답이 도착하면 아래 값들은 최신 환율로 자동으로 덮어써집니다)
    // exchangeRates: 화폐별 정보를 담은 객체 (이름, 국기, 원화 환산 기준값)
    var exchangeRates = {
      KRW: { name: '원화', flag: '🇰🇷', rateToKrw: 1 },
      USD: { name: '달러', flag: '🇺🇸', rateToKrw: 1400 },
      JPY: { name: '엔화', flag: '🇯🇵', rateToKrw: 9.2 },
      CNY: { name: '위안화', flag: '🇨🇳', rateToKrw: 195 },
      EUR: { name: '유로화', flag: '🇪🇺', rateToKrw: 1550 }
    };

    // 현재 선택된 출발/도착 화폐 코드 (기본값: 원화 -> 달러)
    var fromCurrency = 'KRW';
    var toCurrency = 'USD';

    // 사용자가 입력중인 숫자 문자열
    var inputValue = '0';

    // -----------------------------------------------
    // 화면(HTML)이 다 그려지자마자(=스크립트가 실행되자마자) 곧바로
    // 화폐 버튼 글자와 드롭다운 목록부터 먼저 만들어둡니다.
    // 이렇게 하면 서버 응답을 기다리지 않아도 화폐 선택 버튼이 바로 눌립니다.
    // -----------------------------------------------
    updateCurrencyLabels();
    buildDropdownLists();

    // -----------------------------------------------
    // 페이지가 열리면 서버(Code.gs)에 최신 환율 정보를 요청합니다.
    // 성공하면 환율 숫자만 최신값으로 갱신하고(화폐 목록 구조는 그대로),
    // 혹시 실패하더라도(google.script 를 못 쓰는 환경 등) 위에서 넣어둔
    // 기본 환율값으로 계속 사용할 수 있으므로 화면은 정상 작동합니다.
    // -----------------------------------------------
    window.onload = function () {
      // google.script 객체가 있는 정상적인 앱스 스크립트 웹앱 환경일 때만 서버 호출
      if (window.google && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function (serverRates) {
            exchangeRates = convertServerRates(serverRates); // 최신 환율로 교체
            updateCurrencyLabels();                          // 버튼 글자 다시 표시
            buildDropdownLists();                             // 드롭다운 목록도 다시 생성
          })
          .withFailureHandler(function (error) {
            // 서버 호출이 실패해도 기본 환율값으로 계속 사용 가능하도록 안내만 남깁니다.
            console.log('환율 정보를 서버에서 가져오지 못했습니다. 기본값을 사용합니다.', error);
          })
          .환율정보가져오기();
      }
    };

    // -----------------------------------------------
    // Code.gs 에서 오는 데이터(한글 필드명: 이름, 국기, 원화환율)를
    // 화면 코드에서 쓰는 영어 필드명(name, flag, rateToKrw)으로 변환하는 함수
    // -----------------------------------------------
    function convertServerRates(serverRates) {
      var converted = {};
      for (var code in serverRates) {
        var info = serverRates[code];
        converted[code] = {
          name: info.이름,
          flag: info.국기,
          rateToKrw: info.원화환율
        };
      }
      return converted;
    }

    // -----------------------------------------------
    // 동전 소리 효과음을 재생하는 함수
    // 웹오디오(Web Audio API)로 짧은 '띵' 소리를 즉석에서 만들어 재생합니다.
    // (별도의 소리 파일이 필요 없습니다)
    // -----------------------------------------------
    function playCoinSound() {
      try {
        var audioContext = new (window.AudioContext || window.webkitAudioContext)();
        var oscillator = audioContext.createOscillator();
        var gainNode = audioContext.createGain();

        oscillator.type = 'triangle';
        oscillator.frequency.setValueAtTime(1500, audioContext.currentTime); // 높은 '띵' 음
        oscillator.frequency.exponentialRampToValueAtTime(900, audioContext.currentTime + 0.1);

        gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.15);

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.start();
        oscillator.stop(audioContext.currentTime + 0.15);
      } catch (error) {
        // 오디오 재생이 지원되지 않는 환경이면 그냥 무시합니다.
        console.log('소리 재생 불가:', error);
      }
    }

    // -----------------------------------------------
    // 숫자 버튼을 눌렀을 때 실행되는 함수
    // -----------------------------------------------
    function inputNumber(digit) {
      playCoinSound();

      if (inputValue === '0') {
        inputValue = digit; // 맨 앞의 불필요한 0 제거
      } else {
        inputValue = inputValue + digit;
      }
      document.getElementById('inputBox').innerText = inputValue;
    }

    // -----------------------------------------------
    // 00 버튼을 눌렀을 때 실행되는 함수 (숫자 뒤에 0을 두 개 붙여줌)
    // -----------------------------------------------
    function inputDoubleZero() {
      playCoinSound();

      if (inputValue === '0') {
        // 맨 처음에 00을 누르면 그냥 0으로 유지
        inputValue = '0';
      } else {
        inputValue = inputValue + '00';
      }
      document.getElementById('inputBox').innerText = inputValue;
    }

    // -----------------------------------------------
    // 소수점(.) 버튼을 눌렀을 때 실행되는 함수
    // -----------------------------------------------
    function inputDecimal() {
      playCoinSound();

      // 이미 소수점이 있으면 중복 입력 방지
      if (inputValue.indexOf('.') === -1) {
        inputValue = inputValue + '.';
        document.getElementById('inputBox').innerText = inputValue;
      }
    }

    // -----------------------------------------------
    // 지우기(C) 버튼을 눌렀을 때 실행되는 함수
    // -----------------------------------------------
    function clearInput() {
      playCoinSound();
      inputValue = '0';
      document.getElementById('inputBox').innerText = inputValue;
      document.getElementById('resultBox').innerText = '0';
    }

    // -----------------------------------------------
    // 화폐 선택 버튼을 눌렀을 때 드롭다운 목록을 열고 닫는 함수
    // side: 'from' 또는 'to'
    // -----------------------------------------------
    function toggleDropdown(side) {
      playCoinSound();
      var targetId = side === 'from' ? 'fromDropdown' : 'toDropdown';
      var otherId = side === 'from' ? 'toDropdown' : 'fromDropdown';

      // 반대쪽 드롭다운은 닫아줍니다.
      document.getElementById(otherId).classList.remove('open');

      // 선택한 쪽 드롭다운은 열림/닫힘을 토글합니다.
      document.getElementById(targetId).classList.toggle('open');
    }

    // -----------------------------------------------
    // exchangeRates를 기반으로 드롭다운 안에 화폐 목록(버튼들)을 만들어 넣는 함수
    // -----------------------------------------------
    function buildDropdownLists() {
      var fromDropdown = document.getElementById('fromDropdown');
      var toDropdown = document.getElementById('toDropdown');

      fromDropdown.innerHTML = '';
      toDropdown.innerHTML = '';

      // exchangeRates에 있는 모든 화폐(KRW, USD, JPY, CNY, EUR)에 대해 옵션을 만듭니다.
      for (var code in exchangeRates) {
        (function (code) {
          var info = exchangeRates[code];

          // 출발(기존화폐) 목록용 옵션
          var fromOption = document.createElement('div');
          fromOption.className = 'currency-option';
          fromOption.innerText = info.flag + ' ' + info.name;
          fromOption.onclick = function () { selectCurrency('from', code); };
          fromDropdown.appendChild(fromOption);

          // 도착(바꿀화폐) 목록용 옵션
          var toOption = document.createElement('div');
          toOption.className = 'currency-option';
          toOption.innerText = info.flag + ' ' + info.name;
          toOption.onclick = function () { selectCurrency('to', code); };
          toDropdown.appendChild(toOption);
        })(code);
      }
    }

    // -----------------------------------------------
    // 드롭다운 목록에서 화폐를 하나 선택했을 때 실행되는 함수
    // -----------------------------------------------
    function selectCurrency(side, code) {
      playCoinSound();

      if (side === 'from') {
        fromCurrency = code;
        document.getElementById('fromDropdown').classList.remove('open');
      } else {
        toCurrency = code;
        document.getElementById('toDropdown').classList.remove('open');
      }
      updateCurrencyLabels();
    }

    // -----------------------------------------------
    // 선택된 화폐에 맞게 버튼 텍스트(국기+이름)를 갱신하는 함수
    // -----------------------------------------------
    function updateCurrencyLabels() {
      if (!exchangeRates) return;
      var fromInfo = exchangeRates[fromCurrency];
      var toInfo = exchangeRates[toCurrency];
      document.getElementById('fromButton').innerText = fromInfo.flag + ' ' + fromInfo.name + ' ▾';
      document.getElementById('toButton').innerText = toInfo.flag + ' ' + toInfo.name + ' ▾';
    }

    // -----------------------------------------------
    // 환전하기 버튼을 눌렀을 때 실제 환율 계산을 수행하는 함수
    // -----------------------------------------------
    function convertCurrency() {
      playCoinSound();

      if (!exchangeRates) {
        alert('환율 정보를 불러오는 중입니다. 잠시 후 다시 시도해주세요.');
        return;
      }

      var amount = parseFloat(inputValue);
      if (isNaN(amount)) {
        amount = 0;
      }

      // 계산 방법: 입력 금액을 먼저 원화로 환산한 뒤, 목표 화폐로 다시 환산합니다.
      var krwAmount = amount * exchangeRates[fromCurrency].rateToKrw;
      var resultAmount = krwAmount / exchangeRates[toCurrency].rateToKrw;

      // 소수점 둘째 자리까지 반올림해서 보기 좋게 표시합니다.
      var roundedResult = Math.round(resultAmount * 100) / 100;

      document.getElementById('resultBox').innerText =
        roundedResult.toLocaleString('ko-KR', { maximumFractionDigits: 2 });
    }

    // -----------------------------------------------
    // 드롭다운 바깥 영역을 클릭하면 열려있는 드롭다운을 닫아주는 기능
    // -----------------------------------------------
    document.addEventListener('click', function (event) {
      var clickedElement = event.target;
      var clickedCurrencyButton = clickedElement.classList.contains('currency-button');
      var clickedCurrencyOption = clickedElement.classList.contains('currency-option');

      if (!clickedCurrencyButton && !clickedCurrencyOption) {
        document.getElementById('fromDropdown').classList.remove('open');
        document.getElementById('toDropdown').classList.remove('open');
      }
    });
  </script>

</body>
</html>
